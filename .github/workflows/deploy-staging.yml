name: Staging Deployment

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/billing-service:staging

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale.
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker network create aws-staging-network || true
            docker pull qarani/billing-service:staging
            docker stop billing-service-staging || true
            docker rm billing-service-staging || true
            docker run -d --name billing-service-staging \
              --network aws-staging-network \
              -p 8808:8808 \
              -e APP_PROFILE=staging \
              -e DB_HOST=postgres-staging \
              -e DB_PORT=5432 \
              -e DB_USER=postgres-staging-user \
              -e DB_PASSWORD=postgres-staging-password \
              -e DB_NAME=billing_db \
              -e DB_SSLMODE=disable \
              -e NATS_URL=nats://nats-staging:4222 \
              -e NATS_USER=nats-staging-user \
              -e NATS_PASSWORD=nats-staging-password \
              -e EUREKA_SERVER_URL=http://discovery-server-staging:8761/eureka \
              -e EUREKA_APP_NAME=billing-service-staging \
              -e EUREKA_INSTANCE_ID=billing-service-staging:8808 \
              -e EUREKA_HOSTNAME=billing-service-staging \
              -e EUREKA_IP_ADDR=billing-service-staging \
              -e EUREKA_VIP_ADDRESS=billing-service \
              -e EUREKA_HEARTBEAT_INTERVAL=30 \
              qarani/billing-service:staging


  open-pr-to-main:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging → main
        run: |
          if gh pr list --base main --head staging --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "✅ Staging deployment succeeded. Auto-generated PR for production release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}