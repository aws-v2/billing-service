name: Prod Deployment

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/billing-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull qarani/billing-service:latest
            docker stop billing-service || true
            docker rm billing-service || true
            docker network create mini-aws-network || true
            docker run -d --name billing-service \
              --network mini-aws-network \
              -p 8808:8808 \
              -e APP_PROFILE=prod \
              -e DB_HOST=postgres-prod \
              -e DB_PORT=5432 \
              -e DB_USER=root \
              -e DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }} \
              -e DB_NAME=billing_db \
              -e NATS_URL=nats://nats-prod:4222 \
              -e NATS_USER=billing-service \
              -e NATS_PASSWORD=${{ secrets.PROD_NATS_PASSWORD }} \
              qarani/billing-service:latest
